version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: trirang-postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-trirang}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trirang"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trirang-network

  redis:
    image: redis:7-alpine
    container_name: trirang-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - redis_data:/data
    networks:
      - trirang-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  trirang-network:
    driver: bridge
